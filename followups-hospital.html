<!doctype html>
<html lang="zh-CN" data-app-mode="static">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e40af" />
    <title>慢病风险分层、行为干预与 MDT 在线协作平台 · 医院管理视图</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      window.__APP_CONFIG__ = {
        mode: "static",
        snapshotPath: "./demo-data/pages-snapshot.json",
        populationPath: "./demo-data/population-cohort.json",
        publicDataPath: "./demo-data/qixia-public-data.json",
        repo: "MoKangMedical/chronicdiseasemanagement",
        projectName: "慢病风险分层、行为干预与 MDT 在线协作平台",
        readOnlyMessage: "GitHub Pages 演示站为只读模式"
      };
      window.__APP_CONFIG__ = window.__APP_CONFIG__ || {
        mode: document.documentElement.dataset.appMode || "live",
        snapshotPath: "./demo-data/pages-snapshot.json",
        populationPath: "./demo-data/population-cohort.json"
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="followups-hospital">
    <div class="shell">
      <header class="sidebar app-topbar">
        <div class="brand">
          <div class="brand-mark">慢病</div>
          <div>
            <h1>慢病风险分层、行为干预与 MDT 在线协作平台</h1>
            <p>医院管理视图</p>
          </div>
        </div>

        <nav class="sidebar-nav">
          <a class="sidebar-nav-link" href="./index.html">区级总览</a>
          <a class="sidebar-nav-link active" href="./followups-hospital.html">医院管理视图</a>
          <a class="sidebar-nav-link" href="./followups-clinician.html">医生工作视图</a>
          <a class="sidebar-nav-link" href="./patient-app.html">患者端</a>
          <a class="sidebar-nav-link" href="./public-data-config.html">公开资料配置台</a>
        </nav>
      </header>

      <main class="main-panel hospital-dashboard-page">
        <header class="hero hero-workbench">
          <div class="hero-copy">
            <p class="eyebrow">Hospital Management</p>
            <h2>医院管理视图</h2>
            <p id="hero-subtitle" class="hero-subtitle"></p>
            <div class="hero-meta-strip">
              <span id="management-scope-summary" class="hero-meta-chip">当前视角加载中</span>
              <span id="management-updated-at" class="hero-meta-chip">更新时间加载中</span>
            </div>
          </div>
          <div class="hero-tools">
            <div class="filter-strip">
              <label class="filter-field">
                <span>医院</span>
                <select id="hospital-filter"></select>
              </label>
              <label class="filter-field">
                <span>工作台角色</span>
                <select id="role-filter">
                  <option value="specialist-doctor">专科医生</option>
                  <option value="general-practitioner">全科医生</option>
                  <option value="health-manager" selected>健康管理师</option>
                </select>
              </label>
            </div>
            <div class="hero-actions">
              <button id="export-followups-btn" class="primary-button">导出当前逾期待办 Excel</button>
              <a class="ghost-button nav-button" href="./followups-clinician.html">切换到医生工作视图</a>
            </div>
          </div>
        </header>

        <section class="management-kpi-section" data-reveal>
          <div class="management-kpi-head">
            <div>
              <p class="eyebrow">Top Row</p>
              <h3>本院今天先看四个核心指标</h3>
              <p class="dim">患者数、起效率、覆盖率和院内可用医生与管理师，作为 B 端管理入口。</p>
            </div>
          </div>
          <div id="management-kpi-cards" class="management-kpi-grid management-kpi-grid-4"></div>
        </section>

        <section class="hospital-management-grid" data-reveal>
          <div class="hospital-management-main">
            <article class="panel">
              <div class="panel-head">
                <span class="panel-kicker">医院详情</span>
                <h3>疾病比例、治疗包与起效率</h3>
              </div>
              <div id="hospital-detail-panel" class="district-module-body"></div>
            </article>

            <article class="panel">
              <div class="panel-head">
                <span class="panel-kicker">三级协同</span>
                <h3>基层筛查 · 区级统筹 · 三级专科联动</h3>
              </div>
              <div id="command-center-network" class="district-module-body"></div>
            </article>
          </div>

          <aside class="hospital-management-side">
            <article class="panel">
              <div class="panel-head">
                <span class="panel-kicker">医院绩效横向对比</span>
                <h3>结构性负荷与闭环效率</h3>
              </div>
              <div id="hospital-benchmark-panel" class="district-module-body"></div>
            </article>

            <article class="panel">
              <div class="panel-head">
                <span class="panel-kicker">MedClaw</span>
                <h3>医院级临床智能边界</h3>
              </div>
              <div id="medclaw-overview" class="district-module-body"></div>
              <div id="medclaw-guardrails" class="district-module-body"></div>
            </article>
          </aside>
        </section>
      </main>
    </div>

    <template id="patient-item-template">
      <button class="patient-item">
        <div class="patient-item-head">
          <strong class="patient-item-name"></strong>
          <span class="pill"></span>
        </div>
        <div class="patient-item-body"></div>
      </button>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
