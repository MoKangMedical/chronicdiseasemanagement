<!doctype html>
<html lang="zh-CN" data-app-mode="static">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e40af" />
    <title>慢病风险分层、行为干预与 MDT 在线协作平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      window.__APP_CONFIG__ = {
        mode: "static",
        snapshotPath: "./demo-data/pages-snapshot.json",
        populationPath: "./demo-data/population-cohort.json",
        publicDataPath: "./demo-data/qixia-public-data.json",
        repo: "MoKangMedical/chronicdiseasemanagement",
        projectName: "慢病风险分层、行为干预与 MDT 在线协作平台",
        readOnlyMessage: "GitHub Pages 演示站为只读模式"
      };
      window.__APP_CONFIG__ = window.__APP_CONFIG__ || {
        mode: document.documentElement.dataset.appMode || "live",
        snapshotPath: "./demo-data/pages-snapshot.json",
        populationPath: "./demo-data/population-cohort.json"
      };
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="home">
    <div class="shell">
      <header class="sidebar app-topbar">
        <div class="brand">
          <div class="brand-mark">慢病</div>
          <div>
            <h1>慢病风险分层、行为干预与 MDT 在线协作平台</h1>
            <p>区级总览数据大屏</p>
          </div>
        </div>

        <nav class="sidebar-nav">
          <a class="sidebar-nav-link active" href="./index.html">区级总览</a>
          <a class="sidebar-nav-link" href="./followups-hospital.html">医院管理视图</a>
          <a class="sidebar-nav-link" href="./followups-clinician.html">医生工作台</a>
          <a class="sidebar-nav-link" href="./patient-app.html">患者端</a>
          <a class="sidebar-nav-link" href="./public-data-config.html">公开资料配置台</a>
        </nav>
      </header>

      <main class="main-panel district-bigscreen">
        <section class="district-screen-grid">
          <aside class="district-column district-column-side" data-reveal>
            <article class="panel district-module-panel">
              <div class="panel-head">
                <span class="panel-kicker">区级运营驾驶舱</span>
                <h3>纳管覆盖、风险压降、闭环执行</h3>
              </div>
              <div id="district-executive-panel" class="district-module-body"></div>
            </article>

            <article class="panel district-module-panel">
              <div class="panel-head">
                <span class="panel-kicker">病种负荷 Storyline</span>
                <h3>协同漏斗与阶段改善</h3>
              </div>
              <div id="population-summary" class="district-module-body district-module-summary"></div>
              <div id="district-flow-story" class="district-module-body"></div>
            </article>
          </aside>

          <section class="district-column district-column-center" data-reveal>
            <article class="panel district-module-panel district-primary-panel">
              <div class="panel-head panel-head-split">
                <div>
                  <span class="panel-kicker">栖霞区医院网络</span>
                  <h3>医院分部与慢病管理规模</h3>
                </div>
                <div class="district-toolbar">
                  <label class="filter-field compact">
                    <span>医院</span>
                    <select id="hospital-filter"></select>
                  </label>
                  <label class="filter-field compact">
                    <span>角色</span>
                    <select id="role-filter">
                      <option value="specialist-doctor">专科医生</option>
                      <option value="general-practitioner">全科医生</option>
                      <option value="health-manager" selected>健康管理师</option>
                    </select>
                  </label>
                  <a id="display-mode-toggle" class="ghost-button nav-button" href="./index.html?display=wallboard">切换区级大屏模式</a>
                </div>
              </div>
              <div id="district-live-stage" class="district-module-body"></div>
            </article>

            <article class="panel district-module-panel district-command-panel">
              <div class="panel-head">
                <span class="panel-kicker">区级动态指挥台</span>
                <h3>区级协同、优先队列与动作底座</h3>
              </div>
              <div class="district-command-grid">
                <div id="command-center-kpis" class="district-module-body"></div>
                <div id="command-center-queue" class="district-module-body"></div>
              </div>
            </article>
          </section>

          <aside class="district-column district-column-side" data-reveal>
            <article class="panel district-module-panel">
              <div class="panel-head">
                <span class="panel-kicker">公开区情口径</span>
                <h3>8 类公开资产、人口结构与三级协同底图</h3>
              </div>
              <div id="qixia-public-profile" class="district-module-body"></div>
            </article>

            <article class="panel district-module-panel">
              <div class="panel-head">
                <span class="panel-kicker">雷达总览</span>
                <h3>最常见慢病风险平均画像</h3>
              </div>
              <div id="population-radar" class="district-module-body"></div>
            </article>
          </aside>
        </section>
      </main>
    </div>

    <template id="patient-item-template">
      <button class="patient-item">
        <div class="patient-item-head">
          <strong class="patient-item-name"></strong>
          <span class="pill"></span>
        </div>
        <div class="patient-item-body"></div>
      </button>
    </template>
    <script type="module" src="./app.js"></script>
  </body>
</html>
